name: 部署到 GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建站点
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || (github.event.repository.name == format('{0}.github.io', github.repository_owner) && format('https://{0}', github.event.repository.name) || format('https://{0}.github.io', github.repository_owner)) }}
          BASE_URL: ${{ vars.BASE_URL || (github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name)) }}

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: 上传构建产物（给 S3）
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4

  deploy_s3:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: build

      - name: 安装 AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: 同步到 S3
        env:
          S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL }}
          S3_DEST: ${{ vars.S3_DEST }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY_SECRET }}
          AWS_DEFAULT_REGION: ${{ vars.S3_REGION || 'cn-shanghai' }}
        run: |
          aws s3 sync build "$S3_DEST" --delete --endpoint-url "$S3_ENDPOINT_URL"
